name: Audiogram pipeline (reusable)

# Pipeline riutilizzabile per un singolo podcast su runner GitHub-hosted.
# Modalità:
#   full     -> restore -> [reset] -> generate -> archive -> publish -> commit stato
#   generate -> restore -> [reset] -> generate -> archive [-> commit stato se reset]
#   publish  -> restore -> [reset] -> publish -> commit stato
# [reset] avviene solo con force=true + episode specifico (azzera lo stato
# dell'episodio in published.json prima di rigenerarlo/ripubblicarlo).
# Se il reset gira, lo stato azzerato viene committato in QUALUNQUE mode: così un
# force-regen in mode=generate persiste e la successiva pubblicazione lo vede.
# Viene invocata dai caller per-podcast (es. pensieriincodice.yml).

on:
  workflow_call:
    inputs:
      podcast:
        description: "Nome cartella sotto podcasts/"
        required: true
        type: string
      environment:
        description: "GitHub Environment da cui ereditare i secret"
        required: true
        type: string
      mode:
        description: "full | generate | publish"
        required: false
        default: full
        type: string
      generator_repo:
        required: false
        default: valeriogalano/podcast-audiogram-generator
        type: string
      generator_ref:
        required: false
        default: main
        type: string
      publisher_repo:
        required: false
        default: valeriogalano/podcast-audiogram-publisher
        type: string
      publisher_ref:
        required: false
        default: main
        type: string
      generate_limit:
        description: "Max soundbite renderizzati per episodio per run"
        required: false
        default: 3
        type: number
      publish_limit:
        description: "Max soundbite pubblicati per run"
        required: false
        default: 1
        type: number
      restore_releases:
        description: "Quante Release recenti ripristinare in ./output prima del run"
        required: false
        default: 1
        type: number
      dry_run:
        description: "Se 'true', il publisher gira in --dry-run (nessun upload, nessun commit stato)"
        required: false
        default: "false"
        type: string
      episode:
        description: "Episodio da processare (vuoto = usa il config: last). Es. '150'"
        required: false
        default: ""
        type: string
      force:
        description: "Se 'true': rigenera con --force e azzera lo stato dell'episodio indicato"
        required: false
        default: "false"
        type: string

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ${{ inputs.environment }}
    permissions:
      contents: write   # commit di published.json + gestione Release/asset
    env:
      OUTPUT_DIR: ${{ github.workspace }}/output
      CONFIG_DIR: ${{ github.workspace }}/.audiogram-config
      SECRETS_DIR: ${{ github.workspace }}/secrets
      STATE_FILE: ${{ github.workspace }}/podcasts/${{ inputs.podcast }}/published.json
      GENERATE_CFG: ${{ github.workspace }}/.audiogram-config/generate.yaml
      PUBLISH_CFG: ${{ github.workspace }}/.audiogram-config/publish.yaml
      TAG_PREFIX: ${{ inputs.podcast }}-
      GH_TOKEN: ${{ github.token }}
      # I tool si eseguono con `python -m`: i loro package vivono nella root dei
      # rispettivi checkout, quindi li rendiamo importabili via PYTHONPATH
      # (il publisher non ha packaging, quindi niente `pip install -e`).
      PYTHONPATH: ${{ github.workspace }}/tools/generator:${{ github.workspace }}/tools/publisher

    steps:
      - name: Checkout orchestratore
        uses: actions/checkout@v4

      - name: Checkout generator
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.generator_repo }}
          ref: ${{ inputs.generator_ref }}
          path: tools/generator

      - name: Checkout publisher
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.publisher_repo }}
          ref: ${{ inputs.publisher_ref }}
          path: tools/publisher

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dipendenze di sistema (ffmpeg, font, envsubst)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core gettext-base

      - name: Installa le dipendenze dei tool
        run: |
          python -m pip install -U pip
          pip install -r tools/generator/requirements.txt
          pip install -r tools/publisher/requirements.txt

      - name: Ricostruisci i secret
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          TELEGRAM_SESSION_B64: ${{ secrets.TELEGRAM_SESSION_B64 }}
        run: |
          mkdir -p "$SECRETS_DIR" "$OUTPUT_DIR" "$CONFIG_DIR"
          [ -n "$YOUTUBE_CLIENT_SECRETS" ] && printf '%s' "$YOUTUBE_CLIENT_SECRETS" > "$SECRETS_DIR/youtube_client_secrets.json"
          [ -n "$YOUTUBE_TOKEN" ] && printf '%s' "$YOUTUBE_TOKEN" > "$SECRETS_DIR/youtube_token.json"
          [ -n "$TELEGRAM_SESSION_B64" ] && printf '%s' "$TELEGRAM_SESSION_B64" | base64 -d > "$SECRETS_DIR/telegram.session"
          echo "secret ricostruiti in $SECRETS_DIR"

      - name: Rendi le config (envsubst)
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          VARS='$OUTPUT_DIR $SECRETS_DIR $STATE_FILE $TELEGRAM_API_ID $TELEGRAM_API_HASH'
          envsubst "$VARS" < "podcasts/${{ inputs.podcast }}/generate.yaml" > "$GENERATE_CFG"
          envsubst "$VARS" < "podcasts/${{ inputs.podcast }}/publish.yaml"  > "$PUBLISH_CFG"

      - name: Valida input episodio
        env:
          EPISODE_INPUT: ${{ inputs.episode }}
        run: |
          case "$EPISODE_INPUT" in
            ""|"last"|"all") ;;
            *[!0-9]*)
              echo "::error::episode deve essere vuoto, 'last', 'all' o numerico"
              exit 1
              ;;
          esac

      - name: Restore archivio dalle Release
        if: ${{ inputs.mode == 'full' || inputs.mode == 'publish' || inputs.mode == 'generate' }}
        env:
          EPISODE_INPUT: ${{ inputs.episode }}
          RESTORE_RELEASES: ${{ inputs.restore_releases }}
        run: |
          N="$RESTORE_RELEASES"
          tags=$(gh release list --limit 100 --json tagName -q '.[].tagName' \
                 | grep -E "^${TAG_PREFIX}ep[0-9]+$" || true)
          # ordina per numero episodio decrescente, prende le prime N
          tags=$(echo "$tags" | sed -E 's/.*ep([0-9]+)$/\1 &/' \
                 | sort -k1 -n -r | awk '{print $2}' | head -n "$N")
          # Se viene richiesto un episodio esplicito, ripristina anche la sua
          # release: puo' essere piu' vecchia delle ultime N.
          if [ -n "$EPISODE_INPUT" ] && [ "$EPISODE_INPUT" != "last" ] && [ "$EPISODE_INPUT" != "all" ]; then
            requested_tag="${TAG_PREFIX}ep${EPISODE_INPUT}"
            tags=$(printf '%s\n%s\n' "$requested_tag" "$tags" | awk 'NF' | sort -u)
          fi
          if [ -z "$tags" ]; then echo "Nessuna release da ripristinare"; exit 0; fi
          tmp=$(mktemp -d)
          for t in $tags; do
            echo "restore $t"
            # scarica solo gli asset caricati (NON gli archivi "Source code")
            gh release download "$t" -D "$tmp/$t" --clobber || continue
          done
          # ricostruisce output/epNNN/sbM/ dai nomi file appiattiti
          find "$tmp" -type f | while read -r f; do
            b=$(basename "$f")
            ep=$(echo "$b" | sed -E 's/^(ep[0-9]+).*/\1/')
            case "$b" in
              ep[0-9]*_sb[0-9]*)
                sb=$(echo "$b" | sed -E 's/^ep[0-9]+_(sb[0-9]+).*/\1/')
                dest="$OUTPUT_DIR/$ep/$sb" ;;
              *)
                dest="$OUTPUT_DIR/$ep" ;;
            esac
            mkdir -p "$dest"; cp "$f" "$dest/$b"
          done
          rm -rf "$tmp"
          echo "=== struttura ripristinata ==="
          find "$OUTPUT_DIR" -maxdepth 2 -type d | sort || true

      - name: Reset stato episodio (force)
        id: reset
        if: ${{ inputs.force == 'true' && inputs.episode != '' && inputs.episode != 'last' && inputs.episode != 'all' }}
        env:
          EPISODE_INPUT: ${{ inputs.episode }}
        run: |
          ep="ep${EPISODE_INPUT}"
          tmp=$(mktemp)
          # rimuove le voci "epNNN/..." da ogni piattaforma in published.json
          jq --arg p "$ep/" 'to_entries | map(.value |= map(select(startswith($p) | not))) | from_entries' \
            "$STATE_FILE" > "$tmp" && mv "$tmp" "$STATE_FILE"
          echo "stato azzerato per $ep:"; cat "$STATE_FILE"

      - name: Genera audiogram
        if: ${{ inputs.mode == 'full' || inputs.mode == 'generate' }}
        env:
          EPISODE_INPUT: ${{ inputs.episode }}
          FORCE_INPUT: ${{ inputs.force }}
          GENERATE_LIMIT: ${{ inputs.generate_limit }}
        run: |
          EP=(); [ -n "$EPISODE_INPUT" ] && EP=(--episode "$EPISODE_INPUT")
          FORCE=(); [ "$FORCE_INPUT" = "true" ] && FORCE=(--force)
          python -m audiogram_generator --config "$GENERATE_CFG" \
            --limit "$GENERATE_LIMIT" "${EP[@]}" "${FORCE[@]}"

      - name: Archivia i video nelle Release
        if: ${{ inputs.mode == 'full' || inputs.mode == 'generate' }}
        run: |
          shopt -s nullglob
          for epdir in "$OUTPUT_DIR"/ep*/; do
            ep=$(basename "$epdir")
            tag="${TAG_PREFIX}${ep}"
            # file singoli spacchettati (i nomi sono univoci nell'episodio)
            mapfile -t files < <(find "$epdir" -type f)
            [ ${#files[@]} -eq 0 ] && continue
            gh release view "$tag" >/dev/null 2>&1 \
              || gh release create "$tag" --title "$tag" --notes "Audiogram per $ep" >/dev/null
            gh release upload "$tag" "${files[@]}" --clobber
            echo "archiviati ${#files[@]} file in $tag"
          done

      - name: Pubblica sui social
        if: ${{ inputs.mode == 'full' || inputs.mode == 'publish' }}
        env:
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          EPISODE_INPUT: ${{ inputs.episode }}
          PUBLISH_LIMIT: ${{ inputs.publish_limit }}
        run: |
          TARGET=()
          if [ -n "$EPISODE_INPUT" ] && [ "$EPISODE_INPUT" != "last" ] && [ "$EPISODE_INPUT" != "all" ]; then
            TARGET=("$OUTPUT_DIR/ep${EPISODE_INPUT}")
          fi
          DRY=()
          [ "$DRY_RUN_INPUT" = "true" ] && DRY=(--dry-run)
          python -m publisher "${TARGET[@]}" --config "$PUBLISH_CFG" --limit "$PUBLISH_LIMIT" \
            --state-file "$STATE_FILE" "${DRY[@]}"

      # !cancelled() fa girare il commit anche se lo step di pubblicazione e'
      # fallito: il publisher salva lo stato su disco subito dopo OGNI piattaforma
      # riuscita, quindi un fallimento parziale (es. una piattaforma non
      # configurata) non deve impedire di persistere cio' che e' stato pubblicato.
      # steps.reset.outcome == 'success' fa committare anche in mode=generate
      # quando lo step reset ha azzerato lo stato: senza questo, un force-regen
      # in generate perderebbe il reset (workspace effimero) e i soundbite
      # rigenerati non verrebbero mai ripubblicati.
      # Il commit avviene comunque solo se published.json e' effettivamente cambiato.
      - name: Commit dello stato pubblicazioni
        if: ${{ !cancelled() && inputs.dry_run != 'true' && (inputs.mode == 'full' || inputs.mode == 'publish' || steps.reset.outcome == 'success') }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "podcasts/${{ inputs.podcast }}/published.json"
          if git diff --cached --quiet; then
            echo "Nessuna modifica allo stato"
          else
            git commit -m "chore(${{ inputs.podcast }}): aggiorna stato pubblicazioni [skip ci]"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME"
            git push origin HEAD:"$GITHUB_REF_NAME"
          fi
