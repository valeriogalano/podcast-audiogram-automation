name: Pensieri in codice

on:
  schedule:
    - cron: '0 10 * * 2'   # martedì 10:00 UTC -> genera
    - cron: '0 10 * * 4'   # giovedì 10:00 UTC -> pubblica
  workflow_dispatch:
    inputs:
      mode:
        description: "full | generate | publish"
        required: true
        default: full
        type: choice
        options: [full, generate, publish]
      dry_run:
        description: "Publisher in --dry-run (nessun upload, nessun commit stato)"
        required: false
        default: false
        type: boolean
      episode:
        description: "Episodio da processare (vuoto = da config: last). Es. 150"
        required: false
        default: ""
        type: string
      force:
        description: "Rigenera con --force e azzera lo stato dell'episodio indicato"
        required: false
        default: false
        type: boolean

# Il reusable richiede contents: write (commit stato + Release). Va concesso qui,
# perché il default del GITHUB_TOKEN del repo è read-only.
permissions:
  contents: write

concurrency:
  group: audiogram-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_pipeline.yml
    secrets: inherit
    with:
      podcast: pensieriincodice
      environment: pensieriincodice
      # Su schedule scegli la modalità dal giorno (martedì=genera, giovedì=pubblica);
      # su avvio manuale usa l'input scelto.
      mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || (github.event.schedule == '0 10 * * 2' && 'generate' || 'publish') }}
      dry_run: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && 'true' || 'false' }}
      episode: ${{ github.event_name == 'workflow_dispatch' && inputs.episode || '' }}
      force: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && 'true' || 'false' }}
